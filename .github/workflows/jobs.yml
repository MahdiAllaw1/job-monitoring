name: Job monitor

on:
  schedule:
    # Twice per hour. GitHub can delay scheduled workflows, so do not rely on exact minutes.
    - cron: "7,37 * * * *"
  workflow_dispatch:
    inputs:
      notify_mode:
        description: "new = normal alerts, sample = send detected reference jobs, all = send all detected jobs, reset_baseline = store current jobs as seen"
        required: true
        default: "new"
        type: choice
        options:
          - new
          - sample
          - all
          - reset_baseline

permissions:
  contents: write

concurrency:
  group: job-monitor
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install browser for dynamic career pages
        run: python -m playwright install --with-deps chromium

      - name: Run job monitor
        run: python monitor.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NOTIFY_MODE: ${{ github.event.inputs.notify_mode || 'new' }}

      - name: Commit updated state
        if: ${{ github.event.inputs.notify_mode != 'sample' && github.event.inputs.notify_mode != 'all' }}
        run: |
          git config user.name "job-monitor-bot"
          git config user.email "job-monitor-bot@users.noreply.github.com"
          git add jobs_state.json
          git diff --cached --quiet || git commit -m "Update job monitor state"
          git push
